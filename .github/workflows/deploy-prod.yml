name: Docker Image and Deployment CI

on:
  workflow_dispatch:
    inputs:
      only_env:
        description: "Only update .env."
        type: boolean
        required: false
        default: false
  push:
    branches:
      - prod

jobs:
  build:
    runs-on: blockyresearch-prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create docker build args
        if: inputs.only_env == false
        run: echo "${{ secrets.ENV_FILE_PROD }}" > .env

      - name: Build Docker image
        if: inputs.only_env == false
        run: docker build -t kairosdao-dashboard:latest -f Dockerfile .

      - name: Update .env
        working-directory: /opt/kairosdao
        run: echo "${{ secrets.ENV_FILE_PROD }}" > .env.dashboard

      - name: Run Docker image
        working-directory: /opt/kairosdao
        run: docker compose up -d dashboard
